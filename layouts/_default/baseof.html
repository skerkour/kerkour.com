<!DOCTYPE html>
<html lang="{{ $.Site.Language }}">
  {{ partial "head.html" . }}
  <body>
    <header>
      {{ partial "nav.html" . }}
    </header>

    <main>
      {{ block "main" . }} {{ end }}
    </main>

    <footer>
      {{ partial "footer.html" . }}
    </footer>

    {{/* <!-- <script src="{{ "js/cash-0.7.1.min.js" | relURL }}"></script> --> */}}
    {{ $cash := resources.Get "js/cash-0.7.1.min.js" | minify }}
    {{ $myjs := resources.Get "js/index.js" | minify }}
    <script type="text/javascript">
    {{ $cash.Content | safeJS }}
    {{ $myjs.Content | safeJS}}
    </script>
  </body>
  <script type="text/javascript">
    if (!window.$bloom) {
      window.$bloom = {
        project: 'dbec2db4-3b5e-4dc2-8433-752c109026f7',
        chatbox: false,
      };
    }
    (function(){d=document;s=d.createElement("script");s.src="https://bloom.sh/libs/bloom.js"; s.async=1;d.getElementsByTagName("head")[0].appendChild(s);})();
  </script>
</html>
