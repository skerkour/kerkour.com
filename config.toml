baseURL = "https://kerkour.com"
languageCode = "en-us"
title = "Sylvain Kerkour"
disableHugoGeneratorInject = true
disableKinds = ["section", "taxonomy", "taxonomyTerm", "tags"]

[markup.goldmark.renderer]
  unsafe = true

[params]
  description = "The journey of a developer turned entrepreneur. By Sylvain Kerkour, creator of Bloom and author of Black Hat Rust."
  git = "https://github.com/skerkour/kerkour.com"
  ogimage = "https://www.fatalentropy.com/imgs/og_image.jpg"


[outputFormats.jsonfeed]
  mediaType = "application/json"
  baseName = "feed"
  isPlainText = true

[outputFormats.RSS]
  mediatype = "application/rss"
  baseName = "feed"

[outputs]
  home = ["HTML", "RSS", "jsonfeed"]
