variables:
  # Specify the zola version you want to use here
  ZOLA_VERSION: "v0.7.0"

pages:
  # This config will only publish changes that are pushed on the master branch
  only:
    - master
  script:
    - curl -L https://github.com/getzola/zola/releases/download/$ZOLA_VERSION/zola-$ZOLA_VERSION-x86_64-unknown-linux-gnu.tar.gz > zola.tar.gz
    # Unpack the zola executable
    - tar -xzf zola.tar.gz
    # Execute zola build
    - ./zola build
    - "curl -X POST \"https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE/purge_cache\" -H \"X-Auth-Email: $CLOUDFLARE_USER\" -H \"X-Auth-Key: $CLOUDFLARE_TOKEN\" -H \"Content-Type: application/json\" --data '{\"purge_everything\":true}'"
  artifacts:
    paths:
    - public
