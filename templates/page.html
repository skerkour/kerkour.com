{% extends "index.html" %}

{% block content %}
  <article class='post'>
    <h1 class='post-header'>{{ page.title }}</h1>
    <p class='post-meta'>{{ page.date | date(format="%Y-%m-%d") }}
      {% if page.extra.updated %}
        (updated {{ page.extra.updated | date(format="%Y-%m-%d") }})
      {% endif %}
    </p>
    {{ page.content | safe }}
  </article>
{% endblock content %}
