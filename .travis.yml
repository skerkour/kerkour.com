addons:
  apt:
    packages:
      - python-pygments

git:
  depth: false
  submodules: false


install:
  - wget -qO- https://api.github.com/repos/gohugoio/hugo/releases/latest | sed -r -n '/browser_download_url/{/Linux-64bit.deb/{s@[^:]*:[[:space:]]*"([^"]*)".*@\1@g;p}}' | grep -v extended | xargs wget
  - sudo dpkg -i hugo*.deb

script:
  - make

deploy:
  skip_cleanup: true # Important, otherwise the build output would be purged.
  provider: firebase
  token: $FIREBASE_TOKEN
  project: "kerkour-com"
  on:
    branch: master

notifications:
  email:
    on_success: never
