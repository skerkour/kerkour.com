sudo: false

env:
  - GO111MODULE=on

language: go

go:
  - 1.11

git:
  depth: false
  submodules: false


install:
  - mkdir $HOME/src
  - cd $HOME/src
  - git clone https://github.com/gohugoio/hugo.git
  - cd hugo
  - go install
  - cd ${TRAVIS_BUILD_DIR}

script:
  - make

deploy:
  skip_cleanup: true # Important, otherwise the build output would be purged.
  provider: firebase
  token: $FIREBASE_TOKEN
  project: "kerkour-com"
  on:
    branch: master

notifications:
  email:
    on_success: never
